name: Build bazel images module

on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string
      aws-region:
        required: true
        type: string
      docker-build-args:
          required: false
          type: string
          default: ""
      docker-context:
          required: false
          type: string
          default: .
      docker-target:
          required: false
          type: string
          default: ""
      docker-tag:
          required: false
          type: string
          default: ""
    secrets:
      aws-oidc-role:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  build-push-neo-images:
    strategy:
      matrix:
        include:
          - app: api
            arch: amd
            os: ubuntu-latest
          - app: api
            arch: arm
            os: ubuntu-latest-arm
          - app: core
            arch: amd
            os: ubuntu-latest
          - app: core
            arch: arm
            os: ubuntu-latest-arm

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Bazel build image
        run: |
          bazel run //apps/${{ matrix.app }}:${{ matrix.app }}_load

      - name: Set image variables
        id: set-vars
        shell: bash
        run: |
          RAW_TAG="${{ inputs.docker-tag }}"
          if [ -z "$RAW_TAG" ]; then
            RAW_TAG="${{ github.sha }}"
          fi
          echo "DETERMINED_TAG=$RAW_TAG" >> "$GITHUB_ENV"
          echo "SOURCE_IMAGE=${{ inputs.project }}-${{ matrix.app }}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${{ matrix.arch }}-$RAW_TAG" >> "$GITHUB_ENV"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws-oidc-role }}
          role-session-name: "neo-backend-cd"
          aws-region: ${{ inputs.aws-region }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push Bazel-built image to ECR
        run: |
          IMAGE_NAME="${{ steps.login-ecr.outputs.registry }}/${{ inputs.project }}-${{ matrix.app }}-docker:${{ env.IMAGE_TAG }}"
          docker tag "${{ env.SOURCE_IMAGE }}" "$IMAGE_NAME"
          docker push "$IMAGE_NAME"

  create-push-manifest:
    name: Create and push Docker manifests
    needs: build-push-neo-images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [api, core]

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws-oidc-role }}
          role-session-name: "neo-backend-cd"
          aws-region: ${{ inputs.aws-region }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create and push manifest
        uses: Noelware/docker-manifest-action@0.4.3
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ inputs.project }}-${{ matrix.app }}-docker
          FINAL_TAG: ${{ inputs.docker-tag != '' && inputs.docker-tag || github.sha }}
        with:
          inputs: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.FINAL_TAG }}
          images: >-
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:amd-${{ env.FINAL_TAG }},
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:arm-${{ env.FINAL_TAG }}
          push: true